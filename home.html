<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <!-- daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI Theme -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- favIcon -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!-- fontawesome icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen max-w-md mx-auto bg-base-200">
    <header class="border-b-2 border-gray-200 sticky top-1 bg-base-200">
        <section class="w-11/12 mx-auto p-3 flex justify-between">
            <div class="left flex gap-1">
                <div class="logo w-[60px]">
                    <img src="assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="/payoo.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx-auto py-10 space-y-3">
        <h2 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
        <div class="buttons grid grid-cols-3 gap-3">
            <button onclick="showOnly('add-money')" class="btn btn-soft flex-col h-full py-4">
                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="showOnly('cashout')" class="btn btn-soft flex-col h-full py-4">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button onclick="showOnly('transfer')" class="btn btn-soft flex-col h-full py-4">
                <img src="assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>
            <button onclick="showOnly('get-bonous')" class="btn btn-soft flex-col h-full py-4">
                <img src="assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn btn-soft flex-col h-full py-4">
                <img src="assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="showOnly('history')" class="btn btn-soft flex-col h-full py-4">
                <img src="assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    <section id="add-money" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold mb-4">Add Money</h2>
        <div class="card bg-base-100 w-full shadow-xs rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset text-lg text-black">
                    <label class="label font-bold">Select Bank</label>
                    <select id="add-money-bank" class="select w-full rounded-full bg-base-200 text-lg">
                        <option disabled selected>Select a bank</option>
                        <option value="DBBL">DBBL</option>
                        <option value="IBBL">IBBL</option>
                        <option value="City Bank">City Bank</option>
                    </select>
                <label class="label font-bold">Bank Account Number</label>
                <input id="add-money-number" maxlength="11" minlength="11" type="" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter 11 digit account number" />
                <label class="label font-bold">Amount to Add</label>
                <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter Amount to Add" />
                <label class="label font-bold">Pin Number</label>
                <input id="add-money-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter 4 digit pin number" />
                <button id="add-money-btn" class="btn btn-primary rounded-full mt-4 text-lg">Add Money</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold mb-4">Cashout</h2>
        <div class="card bg-base-100 w-full shadow-xs rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset text-lg text-black">
                <label class="label font-bold">Agent Number</label>
                <input id="cashout-number" maxlength="11" minlength="11" type="" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter 11 digit number" />
                <label class="label font-bold">Amount</label>
                <input id="cashout-amount" type="number" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter amount to withdraw" />
                <label class="label font-bold">Pin Number</label>
                <input id="cashout-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter 4 digit pin number" />
                <button id="cashout-btn" class="btn btn-primary rounded-full mt-4 text-lg">Withdraw Money</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="get-bonous" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold mb-4">Get Bonous</h2>
        <div class="card bg-base-100 w-full shadow-xs rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset text-lg text-black">
                    <label class="label font-bold" for="">Enter Bonous Coupon</label>
                    <input id="coupon-number" maxlength="5" minlength="5" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" type="text" placeholder="Enter your coupon">
                    <button id="bonous-btn" class="btn btn-primary rounded-full mt-4 text-lg">Get Bonous</button>
                </fieldset>
            </div>
        </div>

    </section>

    <section id="transfer" class="w-11/12 mx-auto py-5 hidden">
         <h2 class="text-xl font-bold mb-4">Transfer Money</h2>
        <div class="card bg-base-100 w-full shadow-xs rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset text-lg text-black">
                <label class="label font-bold">User Account Number</label>
                <input id="transfer-acc-number" maxlength="11" minlength="11" type="" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter 11 digit account number" />
                <label class="label font-bold">Amount</label>
                <input id="transfer-money-amount" type="number" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter Amount to Transfer" />
                <label class="label font-bold">Pin Number</label>
                <input id="transfer-money-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 text-lg border-none p-4 w-full" placeholder="Enter 4 digit pin number" />
                <button id="transfer-money-btn" class="btn btn-primary rounded-full mt-4 text-lg">Send Now</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section id="history" class="w-11/12 mx-auto py-5 space-y-5 hidden">
        <h2 class="text-xl font-bold mb-4">Transaction History</h2>
        <div id="history-container" class="">
           
        </div>
    </section>

    <script src="script/machine.js"></script>
    <script src="script/addMoney.js"></script>
    <script src="script/cashout.js"></script>
    <script src="script/transfer.js"></script>
    <script src="script/bonous.js"></script>
</body>
</html>
